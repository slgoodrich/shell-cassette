name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: lint
        run: npm run lint

      - name: typecheck
        run: npm run typecheck

      - name: test
        run: npm test

      - name: test:dogfood
        run: npm run test:dogfood

      - name: build
        run: npm run build

  # Smoke test on the published tarball. Catches dist/ shape, exports map,
  # and peer-dep resolution issues that in-repo tests miss because they
  # resolve through src/. This would have caught the v0.2 deps.inline
  # gap before publish.
  tarball-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: pack
        run: npm pack

      - name: smoke test the tarball in a fresh project
        run: |
          set -e
          mkdir -p /tmp/sc-smoke
          cd /tmp/sc-smoke
          npm init -y > /dev/null
          # Install the tarball plus required peer deps for the adapters
          # we exercise. tinyexec is enough for the positive smoke check.
          # vitest is intentionally NOT installed so we can also verify
          # MissingPeerDependencyError fires for shell-cassette/vitest.
          npm install --silent "$GITHUB_WORKSPACE"/shell-cassette-*.tgz tinyexec
          # Verify each public sub-path resolves at runtime.
          node --input-type=module -e "
            import { useCassette } from 'shell-cassette'
            import { x } from 'shell-cassette/tinyexec'
            import { ShellCassetteError } from 'shell-cassette/errors'
            console.log('useCassette:', typeof useCassette)
            console.log('tinyexec.x:', typeof x)
            console.log('ShellCassetteError:', typeof ShellCassetteError)
            if (typeof useCassette !== 'function') process.exit(1)
            if (typeof x !== 'function') process.exit(1)
            if (typeof ShellCassetteError !== 'function') process.exit(1)
          "

      - name: negative smoke - shell-cassette/vitest without vitest installed
        run: |
          set -e
          cd /tmp/sc-smoke
          # vitest is NOT installed in this project. Importing
          # shell-cassette/vitest must throw MissingPeerDependencyError.
          node --input-type=module -e "
            try {
              await import('shell-cassette/vitest')
              console.error('FAIL: import did not throw')
              process.exit(1)
            } catch (e) {
              if (e?.constructor?.name !== 'MissingPeerDependencyError') {
                console.error('FAIL: wrong error class:', e?.constructor?.name)
                console.error('message:', e?.message)
                process.exit(1)
              }
              if (!String(e.message).includes('shell-cassette/vitest requires vitest')) {
                console.error('FAIL: error message missing required text')
                console.error('actual:', e.message)
                process.exit(1)
              }
              console.log('OK: MissingPeerDependencyError thrown as expected')
            }
          "

      # End-to-end check that the v0.2 deps.inline footgun produces an actionable error.
      # Sets up a fresh project where vitest IS installed but the user's vitest config
      # does NOT opt into inlining shell-cassette. Running vitest in that state must
      # surface VitestPluginRegistrationError mentioning deps.inline, not the cryptic
      # "Vitest failed to find the runner" upstream message.
      - name: negative smoke - vitest without deps.inline must throw VitestPluginRegistrationError
        run: |
          set -e
          mkdir -p /tmp/sc-vitest-smoke
          cd /tmp/sc-vitest-smoke
          npm init -y > /dev/null
          # ESM package so vitest setup files can use top-level await.
          node -e "const p = require('./package.json'); p.type = 'module'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2))"
          # Pin vitest 3.x: this is the version family where the externalization
          # path (no deps.inline) reliably triggers the "Vitest failed to find
          # the runner" error. Vitest 4.x changed externalization behavior so
          # the smoke would no-op there. Production peer-dep range still allows
          # both 3.x and 4.x; the fix code in src/vitest.ts catches whichever
          # throws.
          npm install --silent "$GITHUB_WORKSPACE"/shell-cassette-*.tgz "vitest@^3.0.0"
          cat > setup.mjs <<'EOF'
          import 'shell-cassette/vitest'
          EOF
          cat > smoke.test.mjs <<'EOF'
          import { test } from 'vitest'
          test('placeholder', () => {})
          EOF
          # vitest config WITHOUT deps.inline -> shell-cassette gets externalized.
          cat > vitest.config.mjs <<'EOF'
          export default {
            test: {
              setupFiles: ['./setup.mjs'],
            },
          }
          EOF
          # Capture vitest output. Expect non-zero exit. Output must mention our class
          # and the deps.inline fix path.
          set +e
          npx vitest run smoke.test.mjs > output.log 2>&1
          rc=$?
          set -e
          cat output.log
          if [ "$rc" = "0" ]; then
            echo "FAIL: vitest exited 0 but should have failed registration"
            exit 1
          fi
          if ! grep -q "VitestPluginRegistrationError" output.log; then
            echo "FAIL: VitestPluginRegistrationError not in output"
            exit 1
          fi
          if ! grep -q "deps.inline" output.log; then
            echo "FAIL: deps.inline guidance not in output"
            exit 1
          fi
          echo "OK: VitestPluginRegistrationError thrown with deps.inline guidance"
